on:
  release:
    types: [published]
    branches: [main]

name: release-main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/workflows/setup-uv-env

      - name: Run checks
        uses: ./.github/workflows/run-checks

      - name: Documentation Test
        run: make docs-test

  tox:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/workflows/setup-uv-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test with tox
        run: uv run tox

  documentation:
    runs-on: ubuntu-latest
    needs: tox
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/workflows/setup-uv-env

      - name: Generate documentation
        run: uv run mkdocs gh-deploy --force
